<!doctype html>
<html>
<head><meta charset="utf-8"><style>
  html,body{margin:0;padding:0;background:transparent;}
  svg{display:block;}
</style></head>
<body>
<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="coral" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e58a6b"/>
      <stop offset="1" stop-color="#cb5f3f"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- rounded-square app tile -->
  <rect x="28" y="28" width="456" height="456" rx="108" fill="url(#coral)"/>
  <rect x="28" y="28" width="456" height="456" rx="108" fill="url(#sheen)"/>
  <rect x="28.5" y="28.5" width="455" height="455" rx="107.5" fill="none"
        stroke="#000000" stroke-opacity="0.10" stroke-width="1"/>

  <!-- camera-focus reticle: four corner brackets + center dot -->
  <g fill="none" stroke="#ffffff" stroke-width="30"
     stroke-linecap="round" stroke-linejoin="round">
    <path d="M150 214 L150 150 L214 150"/>
    <path d="M298 150 L362 150 L362 214"/>
    <path d="M362 298 L362 362 L298 362"/>
    <path d="M214 362 L150 362 L150 298"/>
  </g>
  <circle cx="256" cy="256" r="34" fill="#ffffff"/>
</svg>
</body>
</html>
