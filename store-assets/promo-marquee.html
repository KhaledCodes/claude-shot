<!doctype html>
<html><head><meta charset="utf-8"><style>
  :root{
    --bg:#1a1614; --surface:#25201c; --surface-2:#2f2925; --text:#f3ede6; --muted:#a79d92;
    --accent:#d97757; --accent-hover:#e08862; --on-accent:#231009;
    --border:rgba(243,237,230,.08); --border-strong:rgba(243,237,230,.16);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{width:1400px;height:560px;overflow:hidden;
    font:13px -apple-system,BlinkMacSystemFont,"SF Pro Text",system-ui,sans-serif;}
  .canvas{width:1400px;height:560px;display:flex;align-items:center;
    background:radial-gradient(1200px 900px at 88% 20%, #3a2218 0%, #1a1614 55%, #131009 100%);}
  .left{flex:1;padding:0 0 0 80px;}
  .brandrow{display:flex;align-items:center;gap:20px;}
  .brandrow .word{color:#fff;font-size:54px;font-weight:700;letter-spacing:-1px;}
  .head{color:#fff;font:700 42px/1.15 ui-serif,"Iowan Old Style",Georgia,serif;
    margin-top:34px;letter-spacing:-0.5px;}
  .head .hl{color:var(--accent);}
  .sub{color:#cbc2ba;font-size:21px;margin-top:18px;font-weight:400;}
  svg.ico{display:block;filter:drop-shadow(0 10px 26px rgba(217,119,87,.4));}
  .right{width:620px;display:flex;align-items:center;justify-content:center;}
  .frame{width:460px;background:var(--bg);color:var(--text);border-radius:16px;
    border:1px solid var(--border-strong);overflow:hidden;transform:scale(1.04) rotate(-2deg);
    box-shadow:0 50px 110px rgba(0,0,0,.6);}
  .bar{display:flex;align-items:center;justify-content:space-between;gap:8px;
    padding:11px 13px;border-bottom:1px solid var(--border);}
  .b-brand{display:inline-flex;align-items:center;gap:7px;font-weight:600;letter-spacing:.2px;}
  .b-brand img{width:18px;height:18px;border-radius:4px;}
  .from-row{display:inline-flex;align-items:center;gap:6px;color:var(--muted);font-size:11px;}
  .from{color:var(--text);font-weight:500;padding:3px 9px;background:var(--surface);
    border:1px solid var(--border);border-radius:999px;}
  .iconbtn{display:inline-flex;align-items:center;justify-content:center;border:none;
    background:transparent;color:var(--muted);width:26px;height:26px;border-radius:7px;padding:0;}
  .iconbtn svg{width:14px;height:14px;}
  .stage{position:relative;display:flex;align-items:center;justify-content:center;padding:12px;
    background:radial-gradient(120% 90% at 50% 0%, rgba(217,119,87,.05), transparent 60%), var(--surface);}
  .shot{display:block;width:100%;height:auto;border-radius:8px;
    box-shadow:0 0 0 1px var(--border-strong), 0 10px 28px rgba(0,0,0,.45);}
  .actions{display:flex;gap:8px;padding:11px 13px 13px;align-items:center;}
  .btn{border:1px solid transparent;background:transparent;color:var(--muted);
    padding:7px 14px;border-radius:8px;font-size:13px;font-weight:500;white-space:nowrap;}
  .btn.cancel{margin-right:auto;}
  .btn.primary{background:linear-gradient(180deg,var(--accent-hover),var(--accent));
    color:var(--on-accent);font-weight:600;
    box-shadow:0 0 0 4px rgba(217,119,87,.25), 0 0 22px 4px rgba(217,119,87,.4);}
</style></head>
<body><div class="canvas">
  <div class="left">
    <div class="brandrow">
      <svg class="ico" width="92" height="92" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
        <defs><linearGradient id="c" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#e58a6b"/><stop offset="1" stop-color="#cb5f3f"/></linearGradient></defs>
        <rect x="28" y="28" width="456" height="456" rx="108" fill="url(#c)"/>
        <g fill="none" stroke="#fff" stroke-width="30" stroke-linecap="round" stroke-linejoin="round">
          <path d="M150 214 L150 150 L214 150"/><path d="M298 150 L362 150 L362 214"/>
          <path d="M362 298 L362 362 L298 362"/><path d="M214 362 L150 362 L150 298"/></g>
        <circle cx="256" cy="256" r="34" fill="#fff"/></svg>
      <span class="word">Claude Shot</span>
    </div>
    <div class="head">Screenshot any tab,<br><span class="hl">straight into Claude.</span></div>
    <div class="sub">One click or shortcut to your clipboard, claude.ai, or your terminal.</div>
  </div>
  <div class="right">
    <div class="frame">
      <header class="bar">
        <span class="b-brand"><img src="store-icon-128.png" alt="">Claude Shot</span>
        <span class="from-row"><span>from</span><span class="from">stripe.com</span>
          <button class="iconbtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-2.64-6.36"/><path d="M21 3v6h-6"/></svg></button>
          <button class="iconbtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></button></span>
      </header>
      <div class="stage"><img class="shot" src="captured-stripe.png" alt=""></div>
      <div class="actions"><button class="btn cancel">Cancel</button>
        <button class="btn">Crop</button><button class="btn primary">Send to Claude</button></div>
    </div>
  </div>
</div></body></html>
