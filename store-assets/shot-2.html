<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><style>
  :root{--bg:#1c1c1e;--panel:#232326;--text:#f2f2f2;--muted:#9a9aa0;
    --accent:#d97757;--border:#2f2f33;}
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;width:1280px;height:800px;overflow:hidden;
    font:13px/1.4 -apple-system,BlinkMacSystemFont,"SF Pro Text",system-ui,sans-serif;}
  .canvas{position:relative;width:1280px;height:800px;
    background:radial-gradient(1100px 700px at 22% -8%, #3a2218 0%, #16161a 55%, #111114 100%);
    display:flex;flex-direction:column;align-items:center;}
  .headline{margin-top:62px;text-align:center;color:#fff;}
  .headline h1{margin:0;font-size:44px;font-weight:700;letter-spacing:-0.5px;}
  .headline h1 .hl{color:var(--accent);}
  .headline p{margin:14px 0 0;font-size:20px;color:#c7c2bf;}
  .stagewrap{margin-top:44px;transform:scale(1.32);transform-origin:top center;}
  .frame{width:460px;background:var(--bg);color:var(--text);border-radius:14px;
    border:1px solid var(--border);overflow:hidden;
    box-shadow:0 40px 90px rgba(0,0,0,.55);}
  .bar{display:flex;align-items:center;justify-content:space-between;
    padding:10px 12px 8px;border-bottom:1px solid var(--border);}
  .brand{font-weight:600;}
  .from-row{display:inline-flex;align-items:center;gap:6px;color:var(--muted);font-size:11px;}
  .from{color:var(--text);font-weight:500;padding:2px 8px;background:var(--panel);border-radius:999px;}
  .iconbtn{border:1px solid var(--border);background:var(--panel);color:var(--text);
    width:24px;height:24px;border-radius:6px;font-size:14px;line-height:1;padding:0;
    display:inline-flex;align-items:center;justify-content:center;}
  .stage{position:relative;background:var(--panel);height:300px;overflow:hidden;}
  .web{width:100%;height:300px;background:linear-gradient(160deg,#0f172a,#1e293b);
    color:#e2e8f0;font-family:system-ui;display:flex;flex-direction:column;}
  .web .nav{display:flex;align-items:center;gap:10px;padding:12px 16px;
    border-bottom:1px solid rgba(255,255,255,.08);font-size:12px;}
  .web .dot{width:9px;height:9px;border-radius:50%;background:#64748b;}
  .web .logo{font-weight:700;color:#fff;}
  .web .nav .sp{flex:1;}
  .web .nav .link{color:#94a3b8;}
  .web .hero{flex:1;display:flex;flex-direction:column;justify-content:center;padding:0 34px;}
  .web .hero h2{margin:0;font-size:30px;font-weight:800;color:#fff;line-height:1.1;}
  .web .hero h2 span{color:#7dd3fc;}
  .web .hero p{margin:12px 0 0;font-size:13px;color:#94a3b8;max-width:340px;}
  .web .cta{margin-top:18px;display:flex;gap:10px;}
  .web .cta .b1{background:#7dd3fc;color:#0f172a;font-weight:700;padding:8px 16px;border-radius:8px;font-size:12px;}
  .web .cta .b2{border:1px solid rgba(255,255,255,.2);color:#e2e8f0;padding:8px 16px;border-radius:8px;font-size:12px;}
  /* crop selection */
  .crop-rect{position:absolute;left:24px;top:96px;width:300px;height:150px;
    border:1.5px solid var(--accent);background:rgba(217,119,87,.10);
    box-shadow:0 0 0 9999px rgba(0,0,0,.55);}
  .handle{position:absolute;width:9px;height:9px;background:var(--accent);border-radius:2px;}
  .handle.tl{left:-5px;top:-5px;} .handle.tr{right:-5px;top:-5px;}
  .handle.bl{left:-5px;bottom:-5px;} .handle.br{right:-5px;bottom:-5px;}
  .dims{position:absolute;right:6px;bottom:6px;background:rgba(0,0,0,.6);color:#fff;
    font:10px ui-monospace,Menlo,monospace;padding:2px 6px;border-radius:4px;}
  .actions{display:flex;gap:8px;padding:10px 12px 12px;justify-content:flex-end;align-items:center;}
  .btn{border:1px solid var(--border);background:var(--panel);color:var(--text);
    padding:7px 14px;border-radius:8px;font-size:13px;font-weight:500;}
  .btn.ghost{background:transparent;}
  .btn.primary{background:var(--accent);border-color:var(--accent);color:#1c1209;font-weight:600;
    box-shadow:0 0 0 4px rgba(217,119,87,.28),0 0 22px 4px rgba(217,119,87,.45);}
</style></head>
<body>
  <div class="canvas">
    <div class="headline">
      <h1>Drag to crop <span class="hl">just what matters</span></h1>
      <p>Region select happens in-browser at native pixel resolution.</p>
    </div>
    <div class="stagewrap">
      <div class="frame">
        <header class="bar">
          <span class="brand">Claude Shot</span>
          <span class="from-row"><span>from</span><span class="from">stripe.com</span>
            <button class="iconbtn">↻</button><button class="iconbtn">⚙</button></span>
        </header>
        <div class="stage">
          <div class="web">
            <div class="nav"><span class="dot"></span><span class="logo">stripe</span>
              <span class="sp"></span><span class="link">Products · Pricing · Docs</span></div>
            <div class="hero">
              <h2>Payments for<br><span>the internet</span></h2>
              <p>Millions of companies use our platform to accept payments and grow revenue.</p>
              <div class="cta"><span class="b1">Start now</span><span class="b2">Contact sales</span></div>
            </div>
          </div>
          <div class="crop-rect">
            <span class="handle tl"></span><span class="handle tr"></span>
            <span class="handle bl"></span><span class="handle br"></span>
            <span class="dims">600 × 300</span>
          </div>
        </div>
        <div class="actions">
          <button class="btn ghost">Reset</button>
          <button class="btn primary">Use crop</button>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
