<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Claude Shot</title>
    <link rel="stylesheet" href="../shared/theme.css" />
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="frame" id="frame">
      <header class="bar">
        <span class="brand">
          <img src="../icons/icon-48.png" alt="" />
          Claude Shot
        </span>
        <span class="from-row">
          <span class="muted">from</span>
          <span class="from" id="captured-from">…</span>
          <button id="retake" class="iconbtn" type="button" title="Retake screenshot">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M21 12a9 9 0 1 1-2.64-6.36" />
              <path d="M21 3v6h-6" />
            </svg>
          </button>
          <button id="settings" class="iconbtn" type="button" title="Open settings">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <circle cx="12" cy="12" r="3" />
              <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z" />
            </svg>
          </button>
        </span>
      </header>

      <div class="stage" id="stage">
        <div class="placeholder" id="placeholder">Capturing…</div>
        <img id="preview" alt="screenshot preview" hidden />
        <div class="crop-overlay" id="crop-overlay" hidden>
          <div class="crop-rect" id="crop-rect"></div>
        </div>
      </div>

      <div class="error" id="error" hidden></div>

      <div class="result" id="result" hidden>
        <div class="result-icon" id="result-icon"></div>
        <div class="result-text" id="result-text"></div>
        <div class="result-sub" id="result-sub"></div>
      </div>

      <div class="actions">
        <button id="cancel" class="btn ghost" type="button">Cancel</button>
        <button id="crop" class="btn ghost" type="button" hidden>Crop</button>
        <button id="crop-done" class="btn ghost" type="button" hidden>Send crop</button>
        <button id="crop-cancel" class="btn ghost" type="button" hidden>Reset</button>
        <button id="send" class="btn primary" type="button" disabled>Send</button>
      </div>

      <div class="toast" id="toast" hidden></div>
    </div>

    <script type="module" src="popup.js"></script>
  </body>
</html>
